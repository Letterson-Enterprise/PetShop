<mat-toolbar color="primary" class="toolbar">
  <span class="brand">PetShop</span>
  <nav class="nav">
    <a mat-button routerLink="/animais" routerLinkActive="active">Animais</a>
    <a mat-button routerLink="/tutores" routerLinkActive="active">Tutores</a>
  </nav>
  <span class="spacer"></span>
  @if (isAuthenticated()) {
    <button mat-button (click)="logout()">
      <mat-icon>logout</mat-icon>
      Sair
    </button>
  }
</mat-toolbar>

<main class="content">
  <router-outlet></router-outlet>
</main>
